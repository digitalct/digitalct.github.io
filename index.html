<!DOCTYPE html>
<html>
<head>
    <title>3 Frame Layout</title>
</head>

<frameset rows="20%,80%">
    <!-- Top Frame -->
    <frame src="top.html" name="topFrame">

    <!-- Bottom Section Split into Left + Content -->
    <frameset cols="25%,75%">
        <frame src="menu.html" name="menuFrame">
        <frame src="home.html" name="contentFrame">
    </frameset>

</frameset>

</html>
